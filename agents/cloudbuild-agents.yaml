# ==============================================================================
# éozoré Portfólio — Cloud Build Pipeline para Agentes Python
# ==============================================================================
# Trigger: push ou execução manual para agentes
# Deploya o CMO Agent (Python + AGY SDK) no Cloud Run
# ==============================================================================

steps:
  # Step 1: Build da imagem Docker dos agentes
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cmo-agent:latest'
      - '-f'
      - 'agents/Dockerfile'
      - 'agents'

  # Step 2: Push da imagem
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cmo-agent:latest'

  # Step 3: Deploy no Cloud Run como microsserviço "cmo-agent"
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cmo-agent'
      - '--image=gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=FIREBASE_PROJECT_ID=firebase-project-id:latest'

images:
  - 'gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/cmo-agent:latest'

options:
  logging: CLOUD_LOGGING_ONLY
