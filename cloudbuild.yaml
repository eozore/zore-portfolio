# ==============================================================================
# éozoré Portfólio — Cloud Build Pipeline
# ==============================================================================
# Trigger: push na branch main
# Deploya o Next.js (apps/web) no Cloud Run
# ==============================================================================

steps:
  # Step 1: Build da imagem Docker do Next.js
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_BASE_URL=${_NEXT_PUBLIC_BASE_URL}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web:latest'
      - '-f'
      - 'apps/web/Dockerfile'
      - 'apps/web'

  # Step 2: Push da imagem
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/web:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/web:latest'

  # Step 3: Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'frontend'
      - '--image=gcr.io/$PROJECT_ID/web:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=ARTICLE_API_KEY=article-api-key:latest,FIREBASE_PROJECT_ID=firebase-project-id:latest'

substitutions:
  _NEXT_PUBLIC_BASE_URL: 'https://eozore.com'

images:
  - 'gcr.io/$PROJECT_ID/web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
