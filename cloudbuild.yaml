# ==============================================================================
# éozoré Portfólio — Cloud Build Pipeline (Multi-Service)
# ==============================================================================
# Trigger: push na branch main
# Deploya o CMO Agent (FastAPI) e o Next.js (apps/web) no Cloud Run
# ==============================================================================

steps:
  # ── STEP 1: Build da imagem Docker do CMO Agent (Python) ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cmo-agent:latest'
      - '-f'
      - 'agents/cmo_agent/Dockerfile'
      - 'agents/cmo_agent'

  # ── STEP 2: Push da imagem do CMO Agent ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cmo-agent:latest'

  # ── STEP 3: Deploy do CMO Agent no Cloud Run ──
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cmo-agent'
      - '--image=gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8090'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=FIREBASE_PROJECT_ID=firebase-project-id:latest'

  # ── STEP 3b: Build da imagem Docker do Cromex Pricing Service (Python) ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cromex-pricing-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cromex-pricing-service:latest'
      - '-f'
      - 'projects/cromex-pricing-service/Dockerfile'
      - 'projects/cromex-pricing-service'

  # ── STEP 3c: Push da imagem do Cromex Pricing Service ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cromex-pricing-service:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cromex-pricing-service:latest'

  # ── STEP 3d: Deploy do Cromex Pricing Service no Cloud Run ──
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cromex-pricing-service'
      - '--image=gcr.io/$PROJECT_ID/cromex-pricing-service:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=GCP_STORAGE_BUCKET=eozore-cromex-data,IS_LOCAL=false'

  # ── STEP 4: Build da imagem Docker do Next.js ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_BASE_URL=${_NEXT_PUBLIC_BASE_URL}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web:latest'
      - '-f'
      - 'apps/web/Dockerfile'
      - 'apps/web'

  # ── STEP 5: Push da imagem do Next.js ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/web:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/web:latest'

  # ── STEP 6: Deploy do Next.js apontando dinamicamente para a URL do cmo-agent ──
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        CMO_URL=$$(gcloud run services describe cmo-agent --region=us-central1 --format='value(status.url)')
        echo "Detected cmo-agent URL: $$CMO_URL"
        CROMEX_URL=$$(gcloud run services describe cromex-pricing-service --region=us-central1 --format='value(status.url)')
        echo "Detected cromex-pricing-service URL: $$CROMEX_URL"
        gcloud run deploy frontend \
          --image=gcr.io/$PROJECT_ID/web:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --set-secrets=ARTICLE_API_KEY=article-api-key:latest,FIREBASE_PROJECT_ID=firebase-project-id:latest \
          --set-env-vars=CMO_AGENT_URL=$$CMO_URL,NEXT_PUBLIC_PRICING_API_URL=$$CROMEX_URL,PRICING_API_URL=$$CROMEX_URL

substitutions:
  _NEXT_PUBLIC_BASE_URL: 'https://eozore.com'

images:
  - 'gcr.io/$PROJECT_ID/cmo-agent:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/cmo-agent:latest'
  - 'gcr.io/$PROJECT_ID/cromex-pricing-service:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/cromex-pricing-service:latest'
  - 'gcr.io/$PROJECT_ID/web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
