# docker-compose.yml — Desenvolvimento local do Postiz MCP
#
# Uso:
#   cd mcp/postiz
#   cp .env.example .env  # preencha as variáveis
#   docker compose up -d
#
# Serviços:
#   - postiz: aplicação Postiz (porta 5000)
#   - postgres: banco de dados PostgreSQL (porta 5432)
#   - redis: cache e filas (porta 6379)

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz-mcp
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Database
      DATABASE_URL: postgresql://postiz:postiz_dev@postgres:5432/postiz
      # Redis
      REDIS_URL: redis://redis:6379
      # App config
      NODE_ENV: development
      PORT: "5000"
      # JWT secret (desenvolvimento local)
      JWT_SECRET: dev-jwt-secret-change-in-production
      # URLs
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:5000
      # OAuth — preencha com suas credenciais de desenvolvimento
      # Meta (Facebook/Instagram)
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      # LinkedIn
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      # YouTube/Google
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: postiz_dev
      POSTGRES_DB: postiz
    volumes:
      - postiz_pgdata:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: postiz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - postiz_redis:/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postiz_pgdata:
    driver: local
  postiz_redis:
    driver: local

networks:
  postiz-network:
    driver: bridge
