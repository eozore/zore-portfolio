<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }
        #controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(30, 30, 30, 0.95);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }
        .controls-hidden {
            opacity: 0;
            pointer-events: none;
        }
        #text-input-container {
            position: fixed;
            top: 70px;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background-color: #121212;
            z-index: 500;
        }
        textarea {
            width: 100%;
            height: 100%;
            font-size: 20px;
            line-height: 1.5;
            background-color: #1e1e1e;
            color: #eee;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }
        #teleprompter-display {
            display: none;
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            padding: 50vh 15% 50vh 15%; /* Starts from bottom */
            box-sizing: border-box;
            font-size: 70px;
            font-weight: bold;
            line-height: 1.4;
            text-align: center;
            white-space: pre-wrap; /* Keeps line breaks from textarea */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            cursor: pointer;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        button#stop-btn {
            background-color: #f44336;
            display: none;
        }
        button#stop-btn:hover {
            background-color: #da190b;
        }
        button#pause-btn {
            background-color: #ff9800;
            display: none;
        }
        button#pause-btn:hover {
            background-color: #e68a00;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group label {
            font-size: 14px;
            color: #bbb;
        }
        input[type=range] {
            cursor: pointer;
        }
        #play-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            color: rgba(255,255,255,0.7);
            pointer-events: none;
            display: none;
            z-index: 2000;
            transition: opacity 0.5s;
        }
        /* Triangle for focus area */
        .focus-marker {
            position: fixed;
            top: 50%;
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            z-index: 900;
            display: none;
            transform: translateY(-50%);
        }
        .focus-marker.left {
            left: 20px;
            border-left: 20px solid rgba(76, 175, 80, 0.5);
        }
        .focus-marker.right {
            right: 20px;
            border-right: 20px solid rgba(76, 175, 80, 0.5);
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="play-btn">Play</button>
        <button id="pause-btn">Pausar</button>
        <button id="stop-btn">Editar Texto</button>
        
        <div class="control-group">
            <label for="speed">Velocidade:</label>
            <input type="range" id="speed" min="1" max="100" value="30">
        </div>

        <div class="control-group">
            <label for="font-size">Tamanho da Fonte:</label>
            <input type="range" id="font-size" min="30" max="150" value="70">
        </div>
        
        <div style="font-size: 13px; color: #aaa;">Dica: <b>Espaço</b> pausa. Use o <b>scroll do mouse</b> ou <b>Setas</b> para avançar/voltar quando pausado. <b>Esc</b> edita.</div>
    </div>

    <div id="text-input-container">
        <textarea id="text-input" placeholder="Cole seu roteiro aqui para começar..."></textarea>
    </div>

    <div id="teleprompter-display"></div>
    
    <div class="focus-marker left" id="marker-left"></div>
    <div class="focus-marker right" id="marker-right"></div>
    
    <div id="play-indicator">⏸</div>

    <script>
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const textInputContainer = document.getElementById('text-input-container');
        const textInput = document.getElementById('text-input');
        const display = document.getElementById('teleprompter-display');
        const speedInput = document.getElementById('speed');
        const fontSizeInput = document.getElementById('font-size');
        const controls = document.getElementById('controls');
        const markerLeft = document.getElementById('marker-left');
        const markerRight = document.getElementById('marker-right');
        const playIndicator = document.getElementById('play-indicator');

        let animationId;
        let position = 0;
        let isPlaying = false;
        let isTeleprompterMode = false;
        let lastTimestamp = 0;

        function startTeleprompter() {
            if (!textInput.value.trim()) {
                alert("Por favor, insira algum texto.");
                return;
            }

            display.innerText = textInput.value;
            display.style.display = 'block';
            textInputContainer.style.display = 'none';
            playBtn.style.display = 'none';
            pauseBtn.style.display = 'block';
            pauseBtn.innerText = 'Pausar';
            stopBtn.style.display = 'block';
            markerLeft.style.display = 'block';
            markerRight.style.display = 'block';

            // Auto-hide controls after 3 seconds
            setTimeout(() => {
                if (isPlaying) {
                    controls.classList.add('controls-hidden');
                }
            }, 3000);

            position = 0;
            display.style.transform = `translateY(${position}px)`;
            
            isTeleprompterMode = true;
            isPlaying = true;
            lastTimestamp = performance.now();
            scrollText(lastTimestamp);
        }

        playBtn.addEventListener('click', startTeleprompter);

        stopBtn.addEventListener('click', () => {
            isPlaying = false;
            isTeleprompterMode = false;
            cancelAnimationFrame(animationId);
            
            display.style.display = 'none';
            textInputContainer.style.display = 'block';
            playBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
            stopBtn.style.display = 'none';
            markerLeft.style.display = 'none';
            markerRight.style.display = 'none';
            controls.classList.remove('controls-hidden');
        });

        pauseBtn.addEventListener('click', togglePause);

        fontSizeInput.addEventListener('input', (e) => {
            display.style.fontSize = `${e.target.value}px`;
        });

        function togglePause() {
            if (!isTeleprompterMode) return;
            
            isPlaying = !isPlaying;
            if (isPlaying) {
                pauseBtn.innerText = 'Pausar';
                controls.classList.add('controls-hidden');
                lastTimestamp = performance.now();
                scrollText(lastTimestamp);
                showIndicator('▶️');
            } else {
                pauseBtn.innerText = 'Continuar';
                controls.classList.remove('controls-hidden');
                cancelAnimationFrame(animationId);
                showIndicator('⏸');
            }
        }

        function showIndicator(icon) {
            playIndicator.innerText = icon;
            playIndicator.style.display = 'block';
            playIndicator.style.opacity = '1';
            
            setTimeout(() => {
                playIndicator.style.opacity = '0';
                setTimeout(() => {
                    playIndicator.style.display = 'none';
                }, 500);
            }, 500);
        }

        // Toggle controls visibility on mouse move
        document.addEventListener('mousemove', (e) => {
            if (isTeleprompterMode && e.clientY < 100) {
                controls.classList.remove('controls-hidden');
            } else if (isTeleprompterMode && isPlaying && e.clientY >= 100) {
                controls.classList.add('controls-hidden');
            }
        });

        // Click on display to pause/play
        display.addEventListener('click', () => {
            togglePause();
        });

        // Spacebar to pause/play and Arrow keys to scroll
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isTeleprompterMode) {
                e.preventDefault(); // Prevent page scroll
                togglePause();
            }
            if (e.code === 'Escape' && isTeleprompterMode) {
                stopBtn.click();
            }
            
            // Allow arrow keys to scroll when paused
            if (isTeleprompterMode && !isPlaying) {
                if (e.code === 'ArrowUp') {
                    e.preventDefault();
                    position += 80; // Scroll up faster
                    if (position > 0) position = 0;
                    display.style.transform = `translateY(${position}px)`;
                }
                if (e.code === 'ArrowDown') {
                    e.preventDefault();
                    position -= 80;
                    display.style.transform = `translateY(${position}px)`;
                }
            }
        });

        // Allow scrolling with mouse wheel / trackpad
        document.addEventListener('wheel', (e) => {
            if (isTeleprompterMode && !isPlaying) {
                position -= e.deltaY;
                if (position > 0) position = 0; // Prevent scrolling above the start
                display.style.transform = `translateY(${position}px)`;
            }
        });

        function scrollText(timestamp) {
            if (!isPlaying) return;

            const delta = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            // Speed formula: value from 1 to 100.
            // Map to pixels per second: 10px/s to 300px/s
            const speedValue = speedInput.value;
            const pixelsPerSecond = 10 + (speedValue / 100) * 400; // Increased max speed slightly
            
            // Calculate movement for this frame
            const movement = (pixelsPerSecond * delta) / 1000;

            position -= movement;
            display.style.transform = `translateY(${position}px)`;

            // Check if finished scrolling
            // The display has padding 50vh top and bottom.
            const displayHeight = display.getBoundingClientRect().height;
            if (position < -displayHeight) {
                stopBtn.click();
                return;
            }

            animationId = requestAnimationFrame(scrollText);
        }
    </script>
</body>
</html>
